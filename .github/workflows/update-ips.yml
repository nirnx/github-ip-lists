name: Update GitHub meta IP lists

on:
  schedule:
    - cron: '17 5 * * *'   # daily, 05:17 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-ips
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and split meta
        run: |
          set -euo pipefail
          mkdir -p lists
          curl -fsSL -H 'Accept: application/vnd.github+json' \
            https://api.github.com/meta -o meta.json

          for key in actions api web hooks git packages importer copilot; do
            jq -r --arg k "$key" '.[$k][]? // empty' meta.json \
              | sort -u > "lists/${key}.txt"
            jq -r --arg k "$key" '.[$k][]? | select(test(":"))' meta.json \
              | sort -u > "lists/${key}-v6.txt" || true
            jq -r --arg k "$key" '.[$k][]? | select(test(":") | not)' meta.json \
              | sort -u > "lists/${key}-v4.txt" || true
          done

          date -u +"%Y-%m-%dT%H:%M:%SZ" > lists/updated.txt
          jq -r '.verifiable_password_authentication | tostring' meta.json > lists/_meta-sanity.txt
          rm meta.json

      - name: Commit if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add lists/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh GitHub meta IP lists"
            git push
          fi
